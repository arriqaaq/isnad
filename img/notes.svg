<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <filter id="shadow-sm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Note Card -->
  <rect x="20" y="20" width="660" height="380" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <!-- Yellow accent left border -->
  <rect x="20" y="20" width="5" height="380" rx="2" fill="#f59e0b"/>

  <!-- Title -->
  <text x="50" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" letter-spacing="1.5" fill="#c8a96a">STUDY NOTE</text>
  <text x="50" y="76" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1a1a2e">Refutation of Critics</text>

  <!-- Tags -->
  <rect x="50" y="90" width="58" height="22" rx="11" fill="rgba(236,72,153,0.1)" stroke="rgba(236,72,153,0.2)" stroke-width="1"/>
  <text x="79" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ec4899">dawah</text>

  <rect x="116" y="90" width="40" height="22" rx="11" fill="rgba(59,130,246,0.1)" stroke="rgba(59,130,246,0.2)" stroke-width="1"/>
  <text x="136" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#3b82f6">fiqh</text>

  <rect x="164" y="90" width="64" height="22" rx="11" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.2)" stroke-width="1"/>
  <text x="196" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10b981">research</text>

  <!-- Note body text -->
  <text x="50" y="140" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#6b7280">The Quran contains numerous evidences for religious tolerance,</text>
  <text x="50" y="158" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#6b7280">mercy, and justice. Key references below:</text>

  <!-- Embedded Ayah Card -->
  <rect x="50" y="176" width="610" height="88" rx="8" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow-sm)"/>
  <!-- Header bar -->
  <rect x="50" y="176" width="610" height="30" rx="8" fill="#f3f4f6"/>
  <rect x="50" y="198" width="610" height="8" fill="#f3f4f6"/>
  <!-- QURAN badge -->
  <rect x="62" y="182" width="58" height="18" rx="9" fill="rgba(200,169,106,0.1)"/>
  <text x="91" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#c8a96a">QURAN</text>
  <!-- Ref -->
  <text x="130" y="195" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" font-weight="600" fill="#1a1a2e">2:256</text>
  <!-- Arrow -->
  <text x="640" y="195" font-family="system-ui, sans-serif" font-size="11" fill="#9ca3af">\u2192</text>
  <!-- Arabic text -->
  <text x="640" y="228" text-anchor="end" font-family="system-ui, sans-serif" font-size="15" fill="#1a1a2e" direction="rtl" unicode-bidi="bidi-override">&#x644;&#x627; &#x625;&#x643;&#x631;&#x627;&#x647; &#x641;&#x64A; &#x627;&#x644;&#x62F;&#x64A;&#x646; &#x2022; &#x642;&#x62F; &#x62A;&#x628;&#x64A;&#x646; &#x627;&#x644;&#x631;&#x634;&#x62F; &#x645;&#x646; &#x627;&#x644;&#x63A;&#x64A;</text>
  <!-- English -->
  <text x="62" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#9ca3af">There is no compulsion in religion. The right course has become distinct from the wrong.</text>

  <!-- More note text -->
  <text x="50" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#6b7280">Ibn Kathir explains this was revealed about the Ansar. See also</text>

  <!-- Narrator chip inline -->
  <rect x="50" y="300" width="100" height="22" rx="11" fill="rgba(200,169,106,0.08)" stroke="rgba(200,169,106,0.15)" stroke-width="1"/>
  <text x="100" y="315" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#c8a96a">@Ibn Umar</text>
  <text x="160" y="315" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#6b7280"> for his narration on this topic.</text>

  <!-- Bottom bar: color dots + meta -->
  <line x1="50" y1="345" x2="640" y2="345" stroke="#f3f4f6" stroke-width="1"/>
  <circle cx="62" cy="368" r="7" fill="#f59e0b"/>
  <circle cx="82" cy="368" r="7" fill="#10b981"/>
  <circle cx="102" cy="368" r="7" fill="#3b82f6"/>
  <circle cx="122" cy="368" r="7" fill="#ec4899"/>
  <circle cx="142" cy="368" r="7" fill="#8b5cf6"/>
  <text x="164" y="372" font-family="ui-monospace, 'SF Mono', monospace" font-size="10" fill="#9ca3af">3 references</text>
  <text x="600" y="372" font-family="system-ui, sans-serif" font-size="10" fill="#9ca3af">2 min ago</text>
</svg>
