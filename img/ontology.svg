<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 520">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="arr-green" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#16a34a" opacity="0.7"/>
    </marker>
    <marker id="arr-gold" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#c8a96a" opacity="0.7"/>
    </marker>
    <marker id="arr-dkgold" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#b8860b" opacity="0.7"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4a82c8" opacity="0.6"/>
    </marker>
  </defs>

  <!-- ══ Tabaqah labels (left margin) ══ -->
  <text x="14" y="62" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#9ca3af" text-anchor="start">GENERATION 1</text>
  <text x="14" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7.5" fill="#b0b8c4" text-anchor="start">Sahaabah</text>

  <text x="14" y="162" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#9ca3af" text-anchor="start">GENERATION 2</text>
  <text x="14" y="172" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7.5" fill="#b0b8c4" text-anchor="start">Taabi'een</text>

  <text x="14" y="262" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#9ca3af" text-anchor="start">GENERATION 4+</text>
  <text x="14" y="272" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7.5" fill="#b0b8c4" text-anchor="start">Compilers</text>

  <!-- ══ NARRATOR NODES ══ -->

  <!-- Gen 1: Sahabah -->
  <rect x="130" y="40" width="155" height="44" rx="22" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="207" y="66" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#16a34a">Abu Hurayrah</text>

  <rect x="360" y="40" width="130" height="44" rx="22" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="66" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#16a34a">Ibn 'Umar</text>

  <!-- Gen 2: Tabi'een -->
  <rect x="150" y="140" width="120" height="44" rx="22" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="210" y="166" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#16a34a">az-Zuhri</text>

  <rect x="370" y="140" width="110" height="44" rx="22" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="166" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#16a34a">Naafi'</text>

  <!-- Gen 4+: Compilers -->
  <rect x="150" y="240" width="110" height="44" rx="22" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="205" y="266" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#16a34a">Maalik</text>

  <rect x="365" y="240" width="120" height="44" rx="22" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="425" y="266" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#16a34a">Shu'bah</text>

  <!-- ══ heard_from edges (student → teacher, upward) ══ -->
  <!-- az-Zuhri → Abu Hurayrah -->
  <line x1="210" y1="140" x2="207" y2="88" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="225" y="118" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-style="italic" fill="#16a34a" opacity="0.8">heard_from</text>

  <!-- Naafi' → Ibn 'Umar -->
  <line x1="425" y1="140" x2="425" y2="88" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <text x="440" y="118" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-style="italic" fill="#16a34a" opacity="0.8">heard_from</text>

  <!-- Maalik → az-Zuhri -->
  <line x1="205" y1="240" x2="210" y2="188" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Shu'bah → Naafi' (cross-link to show graph complexity) -->
  <line x1="425" y1="240" x2="425" y2="188" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Shu'bah also heard from az-Zuhri (cross-link) -->
  <line x1="380" y1="250" x2="270" y2="172" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5" marker-end="url(#arr-green)"/>

  <!-- ══ HADITH NODES ══ -->
  <rect x="120" y="340" width="150" height="44" rx="12" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="195" y="366" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#c8a96a">Hadith 1</text>

  <rect x="330" y="340" width="150" height="44" rx="12" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="405" y="366" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11.5" font-weight="700" fill="#c8a96a">Hadith 2</text>

  <!-- ══ narrates edges (narrator → hadith) ══ -->
  <line x1="195" y1="284" x2="195" y2="336" stroke="#c8a96a" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <text x="175" y="312" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-style="italic" fill="#c8a96a" opacity="0.8">narrates</text>

  <line x1="425" y1="284" x2="415" y2="336" stroke="#c8a96a" stroke-width="1.5" marker-end="url(#arr-gold)"/>
  <text x="438" y="312" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-style="italic" fill="#c8a96a" opacity="0.8">narrates</text>

  <!-- ══ BOOK NODES ══ -->
  <rect x="120" y="430" width="150" height="40" rx="10" fill="rgba(184,134,11,0.06)" stroke="#b8860b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="195" y="454" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" font-weight="700" fill="#b8860b">Sahih al-Bukhari</text>

  <rect x="330" y="430" width="150" height="40" rx="10" fill="rgba(184,134,11,0.06)" stroke="#b8860b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="405" y="454" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" font-weight="700" fill="#b8860b">Sahih Muslim</text>

  <!-- belongs_to edges -->
  <line x1="195" y1="384" x2="195" y2="426" stroke="#b8860b" stroke-width="1.2" marker-end="url(#arr-dkgold)"/>
  <text x="165" y="410" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-style="italic" fill="#b8860b" opacity="0.7">belongs_to</text>

  <line x1="405" y1="384" x2="405" y2="426" stroke="#b8860b" stroke-width="1.2" marker-end="url(#arr-dkgold)"/>

  <!-- ══ QURAN NODES (right side) ══ -->
  <rect x="570" y="140" width="150" height="40" rx="10" fill="rgba(74,130,200,0.08)" stroke="#4a82c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="645" y="157" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#4a82c8" opacity="0.7">SURAH</text>
  <text x="645" y="170" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" font-weight="700" fill="#4a82c8">al-Baqarah</text>

  <rect x="570" y="220" width="150" height="40" rx="10" fill="rgba(74,130,200,0.08)" stroke="#4a82c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="645" y="237" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#4a82c8" opacity="0.7">AYAH</text>
  <text x="645" y="250" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10.5" font-weight="700" fill="#4a82c8">2:255</text>

  <!-- Surah → Ayah connection -->
  <line x1="645" y1="180" x2="645" y2="216" stroke="#4a82c8" stroke-width="1" opacity="0.4"/>

  <!-- references_hadith edge (dashed: Ayah → Hadith 1) -->
  <line x1="570" y1="245" x2="274" y2="355" stroke="#4a82c8" stroke-width="1.3" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arr-blue)"/>
  <text x="440" y="310" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-style="italic" fill="#4a82c8" opacity="0.7">references_hadith</text>

  <!-- ══ similar_to edge (hadith ↔ hadith, dashed gold) ══ -->
  <line x1="270" y1="362" x2="326" y2="362" stroke="#c8a96a" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="298" y="356" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7" font-style="italic" fill="#c8a96a" opacity="0.6">similar_to</text>

  <!-- ══ Legend ══ -->
  <rect x="560" y="340" width="165" height="130" rx="10" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="642" y="358" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="700" fill="#9ca3af" letter-spacing="1">LEGEND</text>

  <circle cx="578" cy="377" r="5" fill="rgba(22,163,74,0.15)" stroke="#16a34a" stroke-width="1"/>
  <text x="590" y="380" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">Narrator (18K+)</text>

  <rect x="573" y="392" width="10" height="10" rx="3" fill="rgba(200,169,106,0.15)" stroke="#c8a96a" stroke-width="1"/>
  <text x="590" y="401" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">Hadith (368K+)</text>

  <rect x="573" y="412" width="10" height="10" rx="3" fill="rgba(74,130,200,0.15)" stroke="#4a82c8" stroke-width="1"/>
  <text x="590" y="421" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">Quran (6,236 ayahs)</text>

  <rect x="573" y="432" width="10" height="10" rx="3" fill="rgba(184,134,11,0.1)" stroke="#b8860b" stroke-width="1"/>
  <text x="590" y="441" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">Book (6 collections)</text>

  <line x1="573" y1="456" x2="583" y2="456" stroke="#16a34a" stroke-width="1.5"/>
  <text x="590" y="459" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">heard_from / narrates</text>

  <line x1="573" y1="470" x2="583" y2="470" stroke="#4a82c8" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="590" y="473" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">references_hadith</text>
</svg>
