  <!-- Path chips -->
  <rect x="84" y="286" width="100" height="18" rx="9" fill="rgba(214,51,132,0.08)" stroke="rgba(214,51,132,0.15)" stroke-width="1"/>
  <text x="134" y="299" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#4a4a68">Path A: MLX local</text>
  <rect x="194" y="286" width="120" height="18" rx="9" fill="rgba(214,51,132,0.08)" stroke="rgba(214,51,132,0.15)" stroke-width="1"/>
  <text x="254" y="299" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="600" fill="#4a4a68">Path B: Unsloth Colab</text>

  <!-- Connector -->
  <line x1="350" y1="308" x2="350" y2="326" stroke="#d63384" stroke-width="2" opacity="0.4"/>
