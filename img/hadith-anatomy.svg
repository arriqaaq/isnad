<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="360" y="20" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#c8a96a">ANATOMY OF A HADITH — SAHIH AL-BUKHARI #765</text>

  <!-- Sanad bracket region -->
  <rect x="10" y="36" width="620" height="90" rx="8" fill="rgba(22,163,74,0.04)" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="20" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="#16a34a" letter-spacing="1">SANAD (CHAIN)</text>

  <!-- Chain nodes — correct chain: Bukhari ← Ibn Yoosuf ← Maalik ← az-Zuhri ← M. ibn Jubayr ← Jubayr -->
  <rect x="15" y="62" width="82" height="28" rx="14" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1"/>
  <text x="56" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" font-weight="600" fill="#16a34a">al-Bukhari</text>
  <text x="56" y="116" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6.5" fill="#9ca3af">Compiler</text>

  <text x="103" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9ca3af">→</text>

  <rect x="112" y="62" width="82" height="28" rx="14" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1"/>
  <text x="153" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" font-weight="600" fill="#16a34a">Ibn Yoosuf</text>
  <text x="153" y="116" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6.5" fill="#9ca3af">Gen 8</text>

  <text x="200" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9ca3af">→</text>

  <rect x="210" y="62" width="72" height="28" rx="14" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1"/>
  <text x="246" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" font-weight="600" fill="#16a34a">Maalik</text>
  <text x="246" y="116" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6.5" fill="#9ca3af">Gen 7</text>

  <text x="288" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9ca3af">→</text>

  <rect x="296" y="62" width="82" height="28" rx="14" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1"/>
  <text x="337" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" font-weight="600" fill="#16a34a">az-Zuhri</text>
  <text x="337" y="116" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6.5" fill="#9ca3af">Gen 4</text>

  <text x="384" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9ca3af">→</text>

  <rect x="392" y="62" width="95" height="28" rx="14" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1"/>
  <text x="439" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="600" fill="#16a34a">M. ibn Jubayr</text>
  <text x="439" y="116" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6.5" fill="#9ca3af">Gen 2</text>

  <text x="493" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9ca3af">→</text>

  <rect x="502" y="62" width="118" height="28" rx="14" fill="rgba(22,163,74,0.1)" stroke="#16a34a" stroke-width="1.5"/>
  <text x="561" y="80" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" font-weight="700" fill="#16a34a">Jubayr ibn Mut'im</text>
  <text x="561" y="116" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6.5" fill="#9ca3af">Gen 1 · Sahabi</text>

  <!-- Arrow to Prophet -->
  <text x="626" y="80" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9ca3af">→</text>
  <text x="665" y="76" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="#c8a96a">Prophet ﷺ</text>

  <!-- Matn region -->
  <rect x="10" y="140" width="700" height="64" rx="8" fill="rgba(200,169,106,0.04)" stroke="#c8a96a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="20" y="156" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="#c8a96a" letter-spacing="1">MATN (TEXT)</text>

  <text x="20" y="176" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#4a4a68">"I heard the Messenger of Allah ﷺ recite Soorah at-Toor in the Maghrib prayer."</text>
  <text x="20" y="194" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#9ca3af">— Sahih al-Bukhari #765</text>
</svg>
