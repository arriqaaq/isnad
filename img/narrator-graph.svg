<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="ag" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#16a34a" opacity="0.6"/>
    </marker>
    <marker id="aw" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#c8a96a" opacity="0.6"/>
    </marker>
  </defs>

  <!--
    GRID: 3 columns at x=140, x=370, x=555
    5 rows at y=55, y=140, y=220, y=300, y=380
    Node height=34, width varies but centered on column
  -->

  <!-- Title -->
  <text x="360" y="18" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#c8a96a">THE NARRATOR GRAPH — WHY IT'S NOT A SIMPLE TREE</text>

  <!-- Row backgrounds -->
  <rect x="55" y="32" width="655" height="48" rx="4" fill="rgba(22,163,74,0.025)"/>
  <rect x="55" y="118" width="655" height="130" rx="4" fill="rgba(22,163,74,0.015)"/>
  <rect x="55" y="282" width="655" height="48" rx="4" fill="rgba(22,163,74,0.025)"/>

  <!-- Row labels -->
  <text x="14" y="55" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7" font-weight="700" fill="#9ca3af">GEN 1</text>
  <text x="14" y="64" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6" fill="#b0b8c4">Sahabah</text>
  <text x="14" y="175" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7" font-weight="700" fill="#9ca3af">GEN 2-4</text>
  <text x="14" y="184" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6" fill="#b0b8c4">Tabi'een</text>
  <text x="14" y="305" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7" font-weight="700" fill="#9ca3af">GEN 7+</text>
  <text x="14" y="314" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="6" fill="#b0b8c4">Compilers</text>

  <!-- ═══ ROW 0 (y=55): GEN 1 SAHABAH ═══ -->
  <rect x="65" y="38" width="150" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">Abu Hurayrah</text>
  <text x="140" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#16a34a" opacity="0.6">4,708 hadiths</text>

  <rect x="300" y="38" width="140" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">Ibn 'Umar</text>
  <text x="370" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#16a34a" opacity="0.6">3,109 hadiths</text>

  <rect x="485" y="38" width="140" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">Anas ibn Malik</text>
  <text x="555" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" fill="#16a34a" opacity="0.6">2,750 hadiths</text>

  <!-- ═══ ROW 1 (y=140): GEN 2-3 ═══ -->
  <rect x="60" y="123" width="160" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="140" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#16a34a">Sa'eed ibn al-Musayyab</text>
  <text x="225" y="144" font-family="system-ui, sans-serif" font-size="6.5" fill="#9ca3af">gen 2</text>

  <rect x="320" y="123" width="100" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="370" y="144" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#16a34a">Naafi'</text>
  <text x="425" y="144" font-family="system-ui, sans-serif" font-size="6.5" fill="#9ca3af">gen 3</text>

  <!-- ═══ ROW 2 (y=220): GEN 4 ═══ -->
  <rect x="80" y="203" width="120" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="140" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#16a34a">az-Zuhri</text>
  <text x="205" y="224" font-family="system-ui, sans-serif" font-size="6.5" fill="#9ca3af">gen 4</text>

  <rect x="495" y="203" width="120" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="555" y="224" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#16a34a">Qataadah</text>
  <text x="620" y="224" font-family="system-ui, sans-serif" font-size="6.5" fill="#9ca3af">gen 4</text>

  <!-- ═══ ROW 3 (y=300): GEN 7+ COMPILERS ═══ -->
  <rect x="90" y="288" width="100" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="140" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#16a34a">Maalik</text>
  <text x="195" y="309" font-family="system-ui, sans-serif" font-size="6.5" fill="#9ca3af">gen 7</text>

  <rect x="320" y="288" width="100" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="370" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#16a34a">Shu'bah</text>
  <text x="425" y="309" font-family="system-ui, sans-serif" font-size="6.5" fill="#9ca3af">gen 7</text>

  <rect x="480" y="288" width="150" height="34" rx="17" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="555" y="309" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#16a34a">Sufyaan ath-Thawri</text>
  <text x="635" y="309" font-family="system-ui, sans-serif" font-size="6.5" fill="#9ca3af">gen 7</text>

  <!-- ═══ PRIMARY EDGES (perfectly vertical: x1 === x2) ═══ -->

  <!-- Sa'eed → Abu Hurayrah: col LEFT, x=140 -->
  <line x1="140" y1="123" x2="140" y2="76" stroke="#16a34a" stroke-width="1.4" marker-end="url(#ag)"/>

  <!-- Naafi' → Ibn 'Umar: col CENTER, x=370 -->
  <line x1="370" y1="123" x2="370" y2="76" stroke="#16a34a" stroke-width="1.4" marker-end="url(#ag)"/>

  <!-- az-Zuhri → Sa'eed: col LEFT, x=140 -->
  <line x1="140" y1="203" x2="140" y2="161" stroke="#16a34a" stroke-width="1.4" marker-end="url(#ag)"/>

  <!-- Qataadah → Anas: col RIGHT, x=555 (skips gen 2-3 row — straight vertical) -->
  <line x1="555" y1="203" x2="555" y2="76" stroke="#16a34a" stroke-width="1.4" marker-end="url(#ag)"/>

  <!-- Maalik → az-Zuhri: col LEFT, x=140 -->
  <line x1="140" y1="288" x2="140" y2="241" stroke="#16a34a" stroke-width="1.4" marker-end="url(#ag)"/>

  <!-- ═══ CROSS-LINKS (bezier curves, dashed) ═══ -->

  <!-- Maalik (LEFT,300) → Naafi' (CENTER,140): curve right then up -->
  <path d="M 175 295 C 280 295, 370 200, 370 161" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,4" fill="none" opacity="0.35" marker-end="url(#ag)"/>

  <!-- Shu'bah (CENTER,300) → Qataadah (RIGHT,220): curve right then up -->
  <path d="M 410 295 C 500 295, 555 260, 555 241" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,4" fill="none" opacity="0.35" marker-end="url(#ag)"/>

  <!-- Sufyaan (RIGHT,300) → az-Zuhri (LEFT,220): wide curve -->
  <path d="M 500 305 C 350 340, 200 280, 155 241" stroke="#16a34a" stroke-width="1" stroke-dasharray="5,4" fill="none" opacity="0.25" marker-end="url(#ag)"/>

  <!-- ═══ ROW 4 (y=380): HADITH NODES ═══ -->
  <rect x="70" y="362" width="140" height="36" rx="10" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="140" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#c8a96a" letter-spacing="0.5">HADITH</text>
  <text x="140" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#c8a96a">Bukhari #1</text>

  <rect x="300" y="362" width="140" height="36" rx="10" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="370" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#c8a96a" letter-spacing="0.5">HADITH</text>
  <text x="370" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#c8a96a">Muslim #42</text>

  <rect x="485" y="362" width="140" height="36" rx="10" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="555" y="376" text-anchor="middle" font-family="system-ui, sans-serif" font-size="7" font-weight="600" fill="#c8a96a" letter-spacing="0.5">HADITH</text>
  <text x="555" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#c8a96a">Tirmidhi #7</text>

  <!-- narrates: primary vertical edges -->
  <line x1="140" y1="322" x2="140" y2="358" stroke="#c8a96a" stroke-width="1.3" marker-end="url(#aw)"/>
  <line x1="370" y1="322" x2="370" y2="358" stroke="#c8a96a" stroke-width="1.3" marker-end="url(#aw)"/>
  <line x1="555" y1="322" x2="555" y2="358" stroke="#c8a96a" stroke-width="1.3" marker-end="url(#aw)"/>

  <!-- narrates: cross-links (curves) -->
  <path d="M 395 322 C 395 345, 170 345, 170 362" stroke="#c8a96a" stroke-width="0.8" stroke-dasharray="4,3" fill="none" opacity="0.3" marker-end="url(#aw)"/>
  <path d="M 540 322 C 540 345, 395 345, 395 362" stroke="#c8a96a" stroke-width="0.8" stroke-dasharray="4,3" fill="none" opacity="0.3" marker-end="url(#aw)"/>

  <!-- similar_to -->
  <line x1="210" y1="380" x2="296" y2="380" stroke="#c8a96a" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="253" y="374" text-anchor="middle" font-family="system-ui, sans-serif" font-size="6" fill="#c8a96a" opacity="0.4">similar</text>

  <!-- ═══ CALLOUTS ═══ -->
  <rect x="60" y="420" width="290" height="125" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="72" y="438" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#4a4a68" letter-spacing="0.5">KEY COMPLEXITIES</text>
  <circle cx="78" cy="455" r="2.5" fill="#16a34a" opacity="0.4"/>
  <text x="88" y="458" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">One narrator → thousands of hadiths</text>
  <circle cx="78" cy="472" r="2.5" fill="#16a34a" opacity="0.4"/>
  <text x="88" y="475" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">One hadith → multiple parallel chains</text>
  <circle cx="78" cy="489" r="2.5" fill="#16a34a" opacity="0.4"/>
  <text x="88" y="492" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">Narrators shared across chains (curves)</text>
  <circle cx="78" cy="506" r="2.5" fill="#c8a96a" opacity="0.4"/>
  <text x="88" y="509" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">Each edge: hadith_ref + chain_position</text>
  <circle cx="78" cy="523" r="2.5" fill="#16a34a" opacity="0.4"/>
  <text x="88" y="526" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">Chains span gen 1 → gen 7+ (5+ hops)</text>

  <rect x="380" y="420" width="215" height="125" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="392" y="438" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#4a4a68" letter-spacing="0.5">SCALE</text>
  <text x="392" y="458" font-family="system-ui, sans-serif" font-size="8" fill="#4a4a68"><tspan font-weight="700" fill="#16a34a">18,000+</tspan> narrator nodes</text>
  <text x="392" y="475" font-family="system-ui, sans-serif" font-size="8" fill="#4a4a68"><tspan font-weight="700" fill="#c8a96a">34,457</tspan> hadith nodes</text>
  <text x="392" y="492" font-family="system-ui, sans-serif" font-size="8" fill="#4a4a68"><tspan font-weight="700" fill="#16a34a">~300K</tspan> heard_from edges</text>
  <text x="392" y="509" font-family="system-ui, sans-serif" font-size="8" fill="#4a4a68"><tspan font-weight="700" fill="#c8a96a">~150K</tspan> narrates edges</text>
  <text x="392" y="535" font-family="system-ui, sans-serif" font-size="7" fill="#9ca3af">Data: SemanticHadith KG V2</text>
</svg>
