<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="ag" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#16a34a" opacity="0.7"/>
    </marker>
    <marker id="aw" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#c8a96a" opacity="0.7"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#b8860b" opacity="0.7"/>
    </marker>
    <marker id="abl" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4a82c8" opacity="0.6"/>
    </marker>
  </defs>

  <!--
    GRID:
    Row 0 (y=50):  Narrator B ——heard_from——→ Narrator A       [Traversal box far right]
    Row 0b (y=105): Metadata box (centered under heard_from arrow)
    Row 1 (y=175): Hadith ——belongs_to——→ Book
    Row 2 (y=260): Ayah (below, with dashed line up to Hadith)
    Row 3 (y=330): Code block (left), Legend (right)

    narrates edge: x=60, runs down LEFT side, clear of everything
  -->

  <!-- Title -->
  <text x="350" y="18" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#c8a96a">GRAPH EDGES IN SURREALQL — RELATIONS WITH METADATA</text>

  <!-- ═══ ROW 0 (y=50): NARRATOR → heard_from → NARRATOR ═══ -->
  <rect x="30" y="33" width="130" height="40" rx="20" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">Narrator B</text>
  <text x="95" y="65" text-anchor="middle" font-family="monospace" font-size="7" fill="#16a34a" opacity="0.6">student (in)</text>

  <!-- heard_from arrow: perfectly horizontal at y=53 -->
  <line x1="160" y1="53" x2="268" y2="53" stroke="#16a34a" stroke-width="1.5" marker-end="url(#ag)"/>
  <rect x="182" y="37" width="70" height="14" rx="3" fill="rgba(22,163,74,0.1)"/>
  <text x="217" y="47" text-anchor="middle" font-family="monospace" font-size="7" font-weight="600" fill="#16a34a">heard_from</text>

  <rect x="274" y="33" width="130" height="40" rx="20" fill="rgba(22,163,74,0.08)" stroke="#16a34a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="339" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#16a34a">Narrator A</text>
  <text x="339" y="65" text-anchor="middle" font-family="monospace" font-size="7" fill="#16a34a" opacity="0.6">teacher (out)</text>

  <!-- Traversal syntax box (far right, same row) -->
  <rect x="450" y="30" width="235" height="50" rx="8" fill="rgba(22,163,74,0.04)" stroke="#16a34a" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="462" y="47" font-family="system-ui, sans-serif" font-size="7.5" font-weight="700" fill="#16a34a">TRAVERSAL SYNTAX</text>
  <text x="462" y="62" font-family="monospace" font-size="7.5" fill="#4a4a68">->heard_from->narrator  <tspan fill="#9ca3af">teachers</tspan></text>
  <text x="462" y="74" font-family="monospace" font-size="7.5" fill="#4a4a68">&lt;-heard_from&lt;-narrator  <tspan fill="#9ca3af">students</tspan></text>

  <!-- ═══ ROW 0b (y=100): Metadata box (centered under arrow) ═══ -->
  <rect x="130" y="88" width="210" height="42" rx="6" fill="#fafafa" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="142" y="102" font-family="monospace" font-size="7" fill="#4a4a68">TYPE RELATION FROM narrator TO narrator</text>
  <text x="142" y="115" font-family="monospace" font-size="7" fill="#16a34a">hadith_ref: record&lt;hadith&gt;</text>
  <text x="142" y="126" font-family="monospace" font-size="7" fill="#16a34a">chain_position: int</text>

  <!-- ═══ NARRATES EDGE: runs down LEFT side at x=60, clear of metadata box ═══ -->
  <line x1="60" y1="73" x2="60" y2="157" stroke="#c8a96a" stroke-width="1.3" marker-end="url(#aw)"/>
  <rect x="18" y="110" width="32" height="28" rx="4" fill="rgba(200,169,106,0.06)" stroke="rgba(200,169,106,0.2)" stroke-width="0.8"/>
  <text x="23" y="122" font-family="monospace" font-size="6" fill="#c8a96a" font-weight="600">nar-</text>
  <text x="23" y="132" font-family="monospace" font-size="6" fill="#c8a96a" font-weight="600">rates</text>

  <!-- ═══ ROW 1 (y=175): HADITH ——belongs_to——→ BOOK ═══ -->
  <rect x="30" y="162" width="150" height="44" rx="12" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#c8a96a">Hadith</text>
  <text x="105" y="196" text-anchor="middle" font-family="monospace" font-size="7" fill="#c8a96a" opacity="0.6">hadith:SB_1</text>

  <!-- belongs_to arrow: perfectly horizontal at y=184 -->
  <line x1="180" y1="184" x2="318" y2="184" stroke="#b8860b" stroke-width="1.2" marker-end="url(#ab)"/>
  <rect x="218" y="170" width="70" height="14" rx="3" fill="rgba(184,134,11,0.08)"/>
  <text x="253" y="180" text-anchor="middle" font-family="monospace" font-size="7" font-weight="600" fill="#b8860b">belongs_to</text>

  <rect x="324" y="162" width="140" height="44" rx="12" fill="rgba(184,134,11,0.06)" stroke="#b8860b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="394" y="180" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#b8860b">Book</text>
  <text x="394" y="196" text-anchor="middle" font-family="monospace" font-size="7" fill="#b8860b" opacity="0.6">book:1</text>

  <!-- ═══ ROW 2 (y=260): AYAH (below Hadith, dashed line up) ═══ -->
  <rect x="30" y="242" width="150" height="44" rx="12" fill="rgba(74,130,200,0.08)" stroke="#4a82c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="105" y="260" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="700" fill="#4a82c8">Ayah</text>
  <text x="105" y="276" text-anchor="middle" font-family="monospace" font-size="7" fill="#4a82c8" opacity="0.6">ayah:2_255</text>

  <!-- references_hadith: vertical dashed line from Ayah up to Hadith -->
  <line x1="105" y1="242" x2="105" y2="210" stroke="#4a82c8" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5" marker-end="url(#abl)"/>
  <text x="165" y="230" font-family="monospace" font-size="7" font-weight="600" fill="#4a82c8">references_hadith</text>

  <!-- ═══ ROW 3 (y=330): CODE BLOCK + LEGEND ═══ -->
  <rect x="30" y="310" width="340" height="80" rx="8" fill="#1a1a2e" filter="url(#shadow)"/>
  <text x="42" y="330" font-family="monospace" font-size="7.5" fill="#9ca3af">-- Reconstruct chain for a hadith</text>
  <text x="42" y="346" font-family="monospace" font-size="7.5" fill="#e2e8f0">SELECT in, out, chain_position</text>
  <text x="42" y="360" font-family="monospace" font-size="7.5" fill="#e2e8f0">  FROM <tspan fill="#16a34a">heard_from</tspan></text>
  <text x="42" y="374" font-family="monospace" font-size="7.5" fill="#e2e8f0">  WHERE <tspan fill="#c8a96a">hadith_ref</tspan> = hadith:SB_1</text>

  <rect x="410" y="310" width="270" height="80" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="422" y="330" font-family="system-ui, sans-serif" font-size="7.5" font-weight="700" fill="#4a4a68" letter-spacing="0.5">EDGE TYPES</text>
  <line x1="422" y1="346" x2="440" y2="346" stroke="#16a34a" stroke-width="1.5"/>
  <text x="448" y="349" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">heard_from <tspan fill="#9ca3af">(narrator → narrator)</tspan></text>
  <line x1="422" y1="362" x2="440" y2="362" stroke="#c8a96a" stroke-width="1.5"/>
  <text x="448" y="365" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">narrates <tspan fill="#9ca3af">(narrator → hadith)</tspan></text>
  <line x1="422" y1="378" x2="440" y2="378" stroke="#b8860b" stroke-width="1.5"/>
  <text x="448" y="381" font-family="system-ui, sans-serif" font-size="7.5" fill="#4a4a68">belongs_to <tspan fill="#9ca3af">(hadith → book)</tspan></text>
</svg>
