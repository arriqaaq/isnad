<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <marker id="ab" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#4a82c8" opacity="0.6"/>
    </marker>
    <marker id="at" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#7c5cbf" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="20" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" letter-spacing="1.5" fill="#c8a96a">QURAN ↔ HADITH CROSS-REFERENCES</text>

  <!-- ═══ LEFT: QURAN COLUMN (x=40-240) ═══ -->
  <text x="140" y="45" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="#4a82c8" letter-spacing="1">QURAN</text>

  <!-- Surah -->
  <rect x="60" y="55" width="160" height="34" rx="8" fill="rgba(74,130,200,0.06)" stroke="#4a82c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="140" y="69" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7" font-weight="600" fill="#4a82c8" opacity="0.6">SURAH</text>
  <text x="140" y="82" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#4a82c8">al-Baqarah</text>

  <!-- Ayah 2:177 -->
  <line x1="110" y1="89" x2="90" y2="112" stroke="#4a82c8" stroke-width="0.8" opacity="0.3"/>
  <rect x="30" y="115" width="90" height="32" rx="8" fill="rgba(74,130,200,0.08)" stroke="#4a82c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="75" y="135" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#4a82c8">2:177</text>

  <!-- Ayah 2:255 -->
  <line x1="170" y1="89" x2="190" y2="112" stroke="#4a82c8" stroke-width="0.8" opacity="0.3"/>
  <rect x="155" y="115" width="90" height="32" rx="8" fill="rgba(74,130,200,0.08)" stroke="#4a82c8" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="200" y="135" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#4a82c8">2:255</text>

  <!-- Tafsir chunks under ayahs -->
  <line x1="75" y1="147" x2="75" y2="162" stroke="#7c5cbf" stroke-width="0.8" opacity="0.4" marker-end="url(#at)"/>
  <rect x="20" y="165" width="110" height="22" rx="6" fill="rgba(124,92,191,0.06)" stroke="#7c5cbf" stroke-width="1"/>
  <text x="75" y="180" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7.5" font-weight="600" fill="#7c5cbf">Tafsir: 3 chunks</text>

  <line x1="200" y1="147" x2="200" y2="162" stroke="#7c5cbf" stroke-width="0.8" opacity="0.4" marker-end="url(#at)"/>
  <rect x="145" y="165" width="110" height="22" rx="6" fill="rgba(124,92,191,0.06)" stroke="#7c5cbf" stroke-width="1"/>
  <text x="200" y="180" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7.5" font-weight="600" fill="#7c5cbf">Tafsir: 5 chunks</text>

  <!-- ═══ RIGHT: HADITH COLUMN (x=450-680) — spaced apart vertically ═══ -->
  <text x="565" y="45" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="700" fill="#c8a96a" letter-spacing="1">HADITH</text>

  <rect x="460" y="55" width="180" height="30" rx="8" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="550" y="74" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#c8a96a">Bukhari #13</text>

  <rect x="460" y="100" width="180" height="30" rx="8" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="550" y="119" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#c8a96a">Muslim #220</text>

  <rect x="460" y="145" width="180" height="30" rx="8" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="550" y="164" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#c8a96a">Abu Dawud #91</text>

  <rect x="460" y="190" width="180" height="30" rx="8" fill="rgba(200,169,106,0.08)" stroke="#c8a96a" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="550" y="209" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="700" fill="#c8a96a">Tirmidhi #55</text>

  <!-- ═══ CROSS-REFERENCE EDGES — clean, separated, labeled ═══ -->

  <!-- 2:177 → Bukhari #13 -->
  <line x1="120" y1="126" x2="456" y2="70" stroke="#4a82c8" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.45" marker-end="url(#ab)"/>

  <!-- 2:177 → Muslim #220 -->
  <line x1="120" y1="131" x2="456" y2="115" stroke="#4a82c8" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.45" marker-end="url(#ab)"/>

  <!-- 2:177 → Abu Dawud #91 -->
  <line x1="120" y1="140" x2="456" y2="160" stroke="#4a82c8" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.35" marker-end="url(#ab)"/>

  <!-- 2:255 → Muslim #220 -->
  <line x1="245" y1="126" x2="456" y2="112" stroke="#4a82c8" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.35" marker-end="url(#ab)"/>

  <!-- 2:255 → Tirmidhi #55 -->
  <line x1="245" y1="136" x2="456" y2="205" stroke="#4a82c8" stroke-width="1.2" stroke-dasharray="6,4" opacity="0.45" marker-end="url(#ab)"/>

  <!-- Edge label -->
  <text x="340" y="90" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="7.5" font-style="italic" fill="#4a82c8" opacity="0.6">references_hadith</text>

  <!-- ═══ CALLOUT BOX ═══ -->
  <rect x="20" y="220" width="680" height="145" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="360" y="242" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8" font-weight="700" fill="#4a4a68" letter-spacing="0.5">WHY THIS IS A GRAPH, NOT A LOOKUP TABLE</text>

  <text x="40" y="266" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">
    <tspan x="40" dy="0">• One ayah can reference <tspan font-weight="700">dozens of hadiths</tspan></tspan>
    <tspan x="50" dy="14" fill="#9ca3af">(2:177 on righteousness → hadiths on prayer, charity, patience, kinship...)</tspan>
  </text>

  <text x="40" y="298" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">
    <tspan x="40" dy="0">• One hadith can be referenced by <tspan font-weight="700">multiple ayahs</tspan></tspan>
    <tspan x="50" dy="14" fill="#9ca3af">(a hadith on prayer may explain verses in al-Baqarah, an-Nisaa', and al-Ma'idah)</tspan>
  </text>

  <text x="40" y="330" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">
    <tspan x="40" dy="0">• Each ayah has <tspan font-weight="700" fill="#7c5cbf">tafsir chunks</tspan> — Ibn Kathir commentary split into 1500-char segments,</tspan>
    <tspan x="50" dy="14" fill="#9ca3af">200-char overlap, each with its own 1024-dim embedding for semantic retrieval</tspan>
  </text>

  <text x="40" y="360" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="8.5" fill="#4a4a68">
    • Total: <tspan font-weight="700">6,236 ayahs</tspan> × tafsir chunks × <tspan font-weight="700">34,457 hadiths</tspan> — connected by <tspan font-weight="700" fill="#4a82c8">references_hadith</tspan> edges
  </text>
</svg>
