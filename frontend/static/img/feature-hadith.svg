<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 520">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Card -->
  <rect x="20" y="20" width="660" height="480" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>

  <!-- Header row: title + badges -->
  <text x="50" y="56" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1a1a2e">Hadith #1</text>
  <!-- Book badge -->
  <rect x="160" y="40" width="110" height="22" rx="11" fill="rgba(200,169,106,0.1)"/>
  <text x="215" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#c8a96a">Sunan Abu Dawud</text>
  <!-- Grade badge -->
  <rect x="280" y="40" width="52" height="22" rx="11" fill="rgba(22,163,74,0.1)"/>
  <text x="306" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#16a34a">Sahih</text>

  <!-- Narrator chips row -->
  <rect x="50" y="72" width="140" height="22" rx="11" fill="rgba(200,169,106,0.08)"/>
  <text x="120" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#c8a96a">al-Mughirah ibn Shu'bah</text>
  <text x="200" y="87" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af">&#8594;</text>
  <rect x="214" y="72" width="80" height="22" rx="11" fill="rgba(200,169,106,0.08)"/>
  <text x="254" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#c8a96a">Abu Salamah</text>
  <text x="304" y="87" font-family="system-ui, sans-serif" font-size="9" fill="#9ca3af">&#8594;</text>
  <rect x="318" y="72" width="130" height="22" rx="11" fill="rgba(200,169,106,0.08)"/>
  <text x="383" y="87" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#c8a96a">Muhammad ibn Amru</text>

  <!-- Separator -->
  <line x1="50" y1="106" x2="650" y2="106" stroke="#f0f1f3" stroke-width="1"/>

  <!-- Arabic hadith text - right aligned -->
  <text x="640" y="138" text-anchor="end" font-family="'Traditional Arabic', 'Noto Naskh Arabic', serif" font-size="17" fill="#1a1a2e">&#x62D;&#x64E;&#x62F;&#x64E;&#x651;&#x62B;&#x64E;&#x646;&#x64E;&#x627; &#x639;&#x64E;&#x628;&#x652;&#x62F;&#x64F; &#x627;&#x644;&#x644;&#x64E;&#x651;&#x647;&#x650; &#x628;&#x652;&#x646;&#x64F; &#x645;&#x64E;&#x633;&#x652;&#x644;&#x64E;&#x645;&#x64E;&#x629;&#x64E; &#x628;&#x652;&#x646;&#x650; &#x642;&#x64E;&#x639;&#x652;&#x646;&#x64E;&#x628; &#x627;&#x644;&#x642;&#x64E;&#x639;&#x652;&#x646;&#x64E;&#x628;&#x650;&#x64A;&#x64F;&#x651;</text>
  <text x="640" y="168" text-anchor="end" font-family="'Traditional Arabic', 'Noto Naskh Arabic', serif" font-size="17" fill="#1a1a2e">&#x62D;&#x64E;&#x62F;&#x64E;&#x651;&#x62B;&#x64E;&#x646;&#x64E;&#x627; &#x639;&#x64E;&#x628;&#x652;&#x62F;&#x64F; &#x627;&#x644;&#x639;&#x64E;&#x632;&#x650;&#x64A;&#x632;&#x650; &#x639;&#x64E;&#x646;&#x650; &#x627;&#x644;&#x645;&#x64F;&#x63A;&#x650;&#x64A;&#x631;&#x64E;&#x629;&#x650; &#x628;&#x652;&#x646;&#x650; &#x634;&#x64F;&#x639;&#x652;&#x628;&#x64E;&#x629;&#x64E;</text>

  <!-- English translation -->
  <text x="50" y="202" font-family="Georgia, serif" font-size="12" fill="#6b7280" font-style="italic">"The Prophet (peace be upon him) when he went to relieve himself went to a far place."</text>

  <!-- Separator -->
  <line x1="50" y1="224" x2="650" y2="224" stroke="#f0f1f3" stroke-width="1"/>

  <!-- Isnad Chain Graph -->
  <text x="50" y="250" font-family="system-ui, sans-serif" font-size="10" font-weight="700" letter-spacing="1" fill="#c8a96a">ISNAD CHAIN</text>

  <!-- Chain: vertical flow of nodes with connecting lines -->
  <!-- Node 1 (top narrator) -->
  <line x1="350" y1="270" x2="350" y2="290" stroke="#c8a96a" stroke-width="1.5"/>
  <rect x="260" y="290" width="180" height="34" rx="8" fill="#ffffff" stroke="#c8a96a" stroke-width="1.5"/>
  <circle cx="276" cy="307" r="10" fill="#16a34a"/>
  <text x="282" y="311" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">1</text>
  <text x="296" y="312" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">al-Mughirah ibn Shu'bah</text>

  <!-- Connector -->
  <line x1="350" y1="324" x2="350" y2="344" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Node 2 -->
  <rect x="280" y="344" width="140" height="34" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="296" cy="361" r="10" fill="#16a34a"/>
  <text x="302" y="365" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">2</text>
  <text x="316" y="366" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">Abu Salamah</text>

  <!-- Connector -->
  <line x1="350" y1="378" x2="350" y2="398" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Node 3 -->
  <rect x="260" y="398" width="180" height="34" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="276" cy="415" r="10" fill="#16a34a"/>
  <text x="282" y="419" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">3</text>
  <text x="296" y="420" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">Muhammad ibn Amru</text>

  <!-- Connector -->
  <line x1="350" y1="432" x2="350" y2="452" stroke="#e5e7eb" stroke-width="1.5"/>

  <!-- Node 4 -->
  <rect x="230" y="452" width="240" height="34" rx="8" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="246" cy="469" r="10" fill="#16a34a"/>
  <text x="252" y="473" font-family="system-ui, sans-serif" font-size="9" font-weight="700" fill="#ffffff">4</text>
  <text x="266" y="474" font-family="system-ui, sans-serif" font-size="11" fill="#1a1a2e">Abd Allah ibn Maslamah al-Qa'nabi</text>
</svg>
